version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ct240_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: .
    container_name: ct240_backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      # Override the MongoDB URI to point to the docker-compose mongodb service
      - SPRING_MONGODB_URI=${SPRING_MONGODB_URI:-mongodb://mongodb:27017/ct240_task_db}
      - JWT_SECRET=${JWT_SECRET:-your-very-secure-secret-key-min-256-bits-change-this}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: 
      context: ../CT240_NLXD_Phan_Mem_Nhom_3_FE
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    container_name: ct240_frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
